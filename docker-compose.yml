services:
  db:
    image: postgres:17-alpine
    container_name: narra-image-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-narra_image}
      POSTGRES_USER: ${POSTGRES_USER:-narra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-narra_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-narra} -d ${POSTGRES_DB:-narra_image}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: narra-image-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-narra}:${POSTGRES_PASSWORD:-narra_password}@db:5432/${POSTGRES_DB:-narra_image}?schema=public
      AUTH_SECRET: ${AUTH_SECRET:-replace-this-secret}
      APP_URL: ${APP_URL:-http://localhost:3000}
      BUILTIN_PROVIDER_BASE_URL: ${BUILTIN_PROVIDER_BASE_URL:-}
      BUILTIN_PROVIDER_API_KEY: ${BUILTIN_PROVIDER_API_KEY:-}
      BUILTIN_PROVIDER_MODEL: ${BUILTIN_PROVIDER_MODEL:-gpt-image-1}
      BUILTIN_PROVIDER_CREDIT_COST: ${BUILTIN_PROVIDER_CREDIT_COST:-5}
      BUILTIN_PROVIDER_NAME: ${BUILTIN_PROVIDER_NAME:-Studio}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-auto}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
      ENABLE_LOCAL_IMAGE_FALLBACK: ${ENABLE_LOCAL_IMAGE_FALLBACK:-true}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@example.com}
      BOOTSTRAP_INVITE_CODE: ${BOOTSTRAP_INVITE_CODE:-FOUNDING-ACCESS}
      BOOTSTRAP_ADMIN_PASSWORD_HASH: ${BOOTSTRAP_ADMIN_PASSWORD_HASH:-}
    ports:
      - "${APP_PORT:-3000}:3000"

volumes:
  postgres_data:
